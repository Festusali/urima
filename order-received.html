    <!-- START purchase event tracking -->
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('order_id');
            const price = parseFloat(params.get('price')) || 20000;
            const quantity = parseInt(params.get('quantity')) || 1;

            // Prevent duplicate firing using a unique key for this order
            const trackingKey = `order_tracked_${orderId}`;
            const hasTracked = sessionStorage.getItem(trackingKey);

            // Only fire if there is a valid Order ID, Price, and it hasn't tracked yet
            if (orderId && price > 0 && !hasTracked) {

                // TikTok Purchase Tracking
                if (typeof ttq !== 'undefined') {
                    ttq.track('Purchase', {
                        contents: [{
                            content_id: 'UG-001',
                            content_name: 'Urima Guard',
                            quantity: quantity,
                            price: price
                        }],
                        value: price,
                        currency: 'NGN'
                    });
                }

                // Meta (Facebook) Purchase Tracking
                if (typeof fbq !== 'undefined') {
                    fbq('track', 'Purchase', {
                        content_ids: ['UG-001'],
                        content_name: 'Urima Guard',
                        content_type: 'product',
                        value: price,
                        currency: 'NGN',
                        num_items: quantity
                    });
                }

                // Mark as tracked in this session
                sessionStorage.setItem(trackingKey, 'true');
                console.log(`Purchase event tracked for Order: ${orderId}`);
            }
        })();
    </script>
